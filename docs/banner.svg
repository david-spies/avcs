<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#060810"/>
      <stop offset="50%"  stop-color="#0d0f18"/>
      <stop offset="100%" stop-color="#060810"/>
    </linearGradient>

    <!-- Amber glow gradient for text -->
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c07010"/>
      <stop offset="50%"  stop-color="#f0b030"/>
      <stop offset="100%" stop-color="#c07010"/>
    </linearGradient>

    <!-- Purple TVO glow -->
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6020a0"/>
      <stop offset="50%"  stop-color="#c060f0"/>
      <stop offset="100%" stop-color="#6020a0"/>
    </linearGradient>

    <!-- Sweep shimmer -->
    <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="40%"  stop-color="transparent"/>
      <stop offset="50%"  stop-color="rgba(255,255,255,0.07)"/>
      <stop offset="60%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

    <!-- Clip for banner shape -->
    <clipPath id="banner-clip">
      <rect width="860" height="200" rx="12"/>
    </clipPath>

    <!-- Glow filter for logo circle -->
    <filter id="glow-amber" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Glow filter for TVO badge -->
    <filter id="glow-purple" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Subtle noise texture overlay -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- ── Background ─────────────────────────────────────── -->
  <rect width="860" height="200" rx="12" fill="url(#bg)" clip-path="url(#banner-clip)"/>

  <!-- Scanline / grid texture -->
  <rect width="860" height="200" rx="12" fill="none"
        stroke="#1a1d28" stroke-width="0.5" opacity="0.4" clip-path="url(#banner-clip)"/>

  <!-- Horizontal scan lines -->
  <g clip-path="url(#banner-clip)" opacity="0.03">
    <line x1="0" y1="20"  x2="860" y2="20"  stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="40"  x2="860" y2="40"  stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="60"  x2="860" y2="60"  stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="80"  x2="860" y2="80"  stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="100" x2="860" y2="100" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="120" x2="860" y2="120" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="140" x2="860" y2="140" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="160" x2="860" y2="160" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="180" x2="860" y2="180" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Ambient left glow blob -->
  <ellipse cx="100" cy="100" rx="120" ry="80" fill="#e8a020" opacity="0.04">
    <animate attributeName="opacity" values="0.04;0.07;0.04" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Ambient right glow blob (purple for TVO) -->
  <ellipse cx="760" cy="100" rx="100" ry="70" fill="#8030d0" opacity="0.06">
    <animate attributeName="opacity" values="0.06;0.10;0.06" dur="5s" begin="1s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Top accent line (animated) -->
  <rect x="0" y="0" width="0" height="2" rx="1" fill="url(#amber)">
    <animate attributeName="width" from="0" to="860" dur="1.2s" fill="freeze" calcMode="spline"
             keyTimes="0;1" keySplines="0.4 0 0.2 1"/>
  </rect>

  <!-- Bottom accent line (delayed) -->
  <rect x="860" y="198" width="0" height="2" rx="1" fill="url(#amber)" transform="scale(-1,1) translate(-860,0)">
    <animate attributeName="width" from="0" to="860" dur="1.2s" begin="0.3s" fill="freeze" calcMode="spline"
             keyTimes="0;1" keySplines="0.4 0 0.2 1"/>
  </rect>

  <!-- ── Logo Circle ─────────────────────────────────────── -->
  <g transform="translate(60,100)" filter="url(#glow-amber)">
    <!-- Outer ring — animated rotation -->
    <circle cx="0" cy="0" r="38" fill="none" stroke="#e8a020" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
    </circle>
    <!-- Inner fill -->
    <circle cx="0" cy="0" r="30" fill="#0e1018" stroke="#e8a020" stroke-width="1.5" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.4s" fill="freeze"/>
    </circle>
    <!-- Play triangle -->
    <polygon points="-10,-14 -10,14 16,0" fill="url(#amber)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.7s" fill="freeze"/>
    </polygon>
    <!-- Waveform lines left of triangle -->
    <rect x="-26" y="-5" width="3" height="10" rx="1.5" fill="#e8a020" opacity="0.5"/>
    <rect x="-21" y="-9" width="3" height="18" rx="1.5" fill="#e8a020" opacity="0.7"/>
    <rect x="-16" y="-12" width="3" height="24" rx="1.5" fill="#e8a020" opacity="0.9"/>
  </g>

  <!-- ── AVCS Title ──────────────────────────────────────── -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="0.5s" fill="freeze"/>
    <text x="118" y="82"
          font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
          font-size="48" font-weight="900" letter-spacing="6"
          fill="url(#amber)">AVCS</text>
  </g>

  <!-- Subtitle -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.9s" fill="freeze"/>
    <text x="120" y="110"
          font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
          font-size="14" font-weight="400" letter-spacing="3"
          fill="#6a6d7a">AUDIO  VIDEO  CONVERSION  SUITE</text>
  </g>

  <!-- Divider line -->
  <line x1="118" y1="124" x2="118" y2="124" stroke="#2a2d35" stroke-width="1" opacity="0">
    <animate attributeName="x2" from="118" to="440" dur="0.8s" begin="1.1s" fill="freeze"/>
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.1s" fill="freeze"/>
  </line>

  <!-- Feature pills row -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.3s" fill="freeze"/>
    <!-- MP4 pill -->
    <rect x="118" y="136" width="36" height="18" rx="9" fill="#1e2810"/>
    <text x="136" y="149" text-anchor="middle"
          font-family="'Segoe UI', monospace" font-size="9" font-weight="700"
          fill="#70b040">MP4</text>
    <!-- MKV -->
    <rect x="160" y="136" width="36" height="18" rx="9" fill="#101828"/>
    <text x="178" y="149" text-anchor="middle"
          font-family="'Segoe UI', monospace" font-size="9" font-weight="700"
          fill="#4090d0">MKV</text>
    <!-- AVI -->
    <rect x="202" y="136" width="30" height="18" rx="9" fill="#201810"/>
    <text x="217" y="149" text-anchor="middle"
          font-family="'Segoe UI', monospace" font-size="9" font-weight="700"
          fill="#d08030">AVI</text>
    <!-- FLAC -->
    <rect x="238" y="136" width="38" height="18" rx="9" fill="#102020"/>
    <text x="257" y="149" text-anchor="middle"
          font-family="'Segoe UI', monospace" font-size="9" font-weight="700"
          fill="#40b0a0">FLAC</text>
    <!-- MP3 -->
    <rect x="282" y="136" width="34" height="18" rx="9" fill="#201020"/>
    <text x="299" y="149" text-anchor="middle"
          font-family="'Segoe UI', monospace" font-size="9" font-weight="700"
          fill="#d060c0">MP3</text>
    <!-- +more -->
    <text x="323" y="149"
          font-family="'Segoe UI', monospace" font-size="9"
          fill="#3a3d45">+ more</text>
  </g>

  <!-- ── TVO Legacy Badge ────────────────────────────────── -->
  <g transform="translate(570,50)" filter="url(#glow-purple)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.5s" fill="freeze"/>

    <!-- Badge background -->
    <rect x="0" y="0" width="240" height="110" rx="10"
          fill="#0c0814" stroke="#5020a0" stroke-width="1.5"/>

    <!-- Cassette icon (stylized) -->
    <rect x="16" y="14" width="46" height="32" rx="5" fill="#1a0c2a" stroke="#6030b0" stroke-width="1.2"/>
    <!-- Left reel -->
    <circle cx="28" cy="30" r="8" fill="none" stroke="#8040d0" stroke-width="1.5"/>
    <circle cx="28" cy="30" r="3" fill="#8040d0"/>
    <!-- Right reel -->
    <circle cx="50" cy="30" r="8" fill="none" stroke="#8040d0" stroke-width="1.5"/>
    <circle cx="50" cy="30" r="3" fill="#8040d0">
      <!-- Spin animation -->
      <animateTransform attributeName="transform" type="rotate"
                        from="0 50 30" to="360 50 30"
                        dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Tape window bottom -->
    <rect x="22" y="38" width="34" height="5" rx="2.5" fill="#0c0814" stroke="#6030b0" stroke-width="0.8"/>

    <!-- TVO label -->
    <text x="72" y="25"
          font-family="'Segoe UI', monospace" font-size="11" font-weight="900" letter-spacing="2"
          fill="url(#purple)">.TVO</text>
    <text x="72" y="42"
          font-family="'Segoe UI', monospace" font-size="8"
          fill="#5a4070">TeVeo VIDiO Suite</text>
    <text x="72" y="56"
          font-family="'Segoe UI', monospace" font-size="7"
          fill="#3a2850">Late 1990s Legacy Format</text>

    <!-- Divider -->
    <line x1="12" y1="62" x2="228" y2="62" stroke="#2a1840" stroke-width="1"/>

    <!-- Status line -->
    <text x="16" y="78"
          font-family="'Segoe UI', monospace" font-size="8"
          fill="#6040a0">▸  Orphaned format — no modern support</text>
    <text x="16" y="92"
          font-family="'Segoe UI', monospace" font-size="8"
          fill="#6040a0">▸  AVCS converts via ffmpeg legacy mode</text>
    <text x="16" y="106"
          font-family="'Segoe UI', monospace" font-size="8"
          fill="#8050c0">▸  Output: MP4 (H.264) recommended ✓</text>
  </g>

  <!-- ── Version / build info ────────────────────────────── -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="0.6" dur="0.5s" begin="1.8s" fill="freeze"/>
    <text x="118" y="178"
          font-family="'Segoe UI', monospace" font-size="9"
          fill="#3a3d45">Python + PyQt5 + ffmpeg  ·  v1.0.0  ·  Linux / Windows / macOS</text>
  </g>

  <!-- ── Sweep shimmer animation ─────────────────────────── -->
  <rect width="860" height="200" rx="12" fill="url(#sweep)" clip-path="url(#banner-clip)" opacity="0.6">
    <animateTransform attributeName="transform" type="translate"
                      from="-860 0" to="860 0"
                      dur="2.5s" begin="2.2s" fill="freeze"/>
  </rect>

  <!-- Border -->
  <rect x="1" y="1" width="858" height="198" rx="11"
        fill="none" stroke="#2a2d38" stroke-width="1.5"/>
</svg>
